# Coolify deployment: builds the WAR from source and runs Tomcat + MySQL.
# Set the compose path to this file in the Coolify resource settings.
services:
  mysql:
    # Custom image with db/schema.sql baked in (see Dockerfile.mysql).
    build:
      context: .
      dockerfile: Dockerfile.mysql
    environment:
      MYSQL_DATABASE: directory
      MYSQL_USER: directory
      MYSQL_PASSWORD: ${DB_PASSWORD:-directory}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpw}
    volumes:
      # Fresh volume name: the old one initialised without the schema.
      - directory-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 30
      # First-boot init runs with networking disabled; don't count those failures.
      start_period: 180s

  tomcat:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # Coolify magic var: exposes this service on container port 8080 and
      # generates SERVICE_FQDN_TOMCAT (set it to the custom domain in Coolify).
      - SERVICE_FQDN_TOMCAT_8080
      - DB_URL=jdbc:mysql://mysql:3306/directory
      - DB_USER=directory
      - DB_PASSWORD=${DB_PASSWORD:-directory}
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  directory-db-data:
